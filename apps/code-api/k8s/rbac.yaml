apiVersion: v1
kind: ServiceAccount
metadata:
  name: code-api
  namespace: mimer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: code-api-role
  namespace: mimer
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch", "create", "delete"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch", "create", "delete"]
- apiGroups: ["sparkoperator.k8s.io"]
  resources: ["sparkapplications"]
  verbs: ["get", "list", "watch", "create", "delete"]
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: code-api-role-binding
  namespace: mimer
subjects:
- kind: ServiceAccount
  name: code-api
  namespace: mimer
roleRef:
  kind: Role
  name: code-api-role
  apiGroup: rbac.authorization.k8s.io
